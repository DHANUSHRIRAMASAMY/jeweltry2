name: jewels
description: "JewelTry - AR Jewelry Try-On App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Camera & AR
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.11.0
  google_mlkit_face_mesh_detection: ^0.1.0

  # Local storage
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.1.7          # on-device background removal

  # 3D viewer
  model_viewer_plus: ^1.9.3

  # File picker (for .glb upload)
  file_picker: ^8.0.0

  # Utils
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/jewelry/
